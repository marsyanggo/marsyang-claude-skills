<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<title>Agent Team — Live Dashboard</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --text: #e6edf3;
    --muted: #8b949e;
    --border: #30363d;
    --opus: #a371f7;
    --sonnet: #58a6ff;
    --haiku: #3fb950;
    --idle: #6e7681;
    --running: #f1c40f;
    --done: #3fb950;
    --error: #f85149;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, "SF Mono", Menlo, monospace; }
  header { padding: 18px 28px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  header .phase { color: var(--muted); font-size: 13px; }
  header .phase strong { color: var(--text); }
  main { display: grid; grid-template-columns: 2fr 1fr; gap: 18px; padding: 18px 28px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px; min-height: 120px; display: flex; flex-direction: column; gap: 6px;
    transition: border-color .2s, box-shadow .2s; }
  .card.running { border-color: var(--running); box-shadow: 0 0 0 1px rgba(241, 196, 15, .35); }
  .card.done { border-color: var(--done); }
  .card.error { border-color: var(--error); }
  .card-head { display: flex; align-items: center; justify-content: space-between; }
  .card-name { font-weight: 600; font-size: 14px; }
  .badge { font-size: 10px; letter-spacing: .08em; font-weight: 700;
    padding: 2px 7px; border-radius: 999px; text-transform: uppercase; }
  .badge.opus   { background: rgba(163, 113, 247, .18); color: var(--opus); }
  .badge.sonnet { background: rgba(88, 166, 255, .18); color: var(--sonnet); }
  .badge.haiku  { background: rgba(63, 185, 80, .18);  color: var(--haiku); }
  .badge.unknown { background: rgba(110, 118, 129, .25); color: var(--muted); }
  .status { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); margin-top: 4px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--idle); }
  .dot.running { background: var(--running); animation: pulse 1.2s ease-in-out infinite; }
  .dot.done    { background: var(--done); }
  .dot.error   { background: var(--error); }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.45;transform:scale(.85)} }
  .activity { font-size: 12.5px; color: var(--text); min-height: 16px; line-height: 1.4; }
  .activity.empty { color: var(--muted); font-style: italic; }
  .meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted);
    margin-top: auto; padding-top: 6px; }
  .role { color: var(--muted); font-size: 11px; }

  .feed { background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px; height: calc(100vh - 130px); display: flex; flex-direction: column; }
  .feed h2 { font-size: 12px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--muted); margin: 0 0 10px; font-weight: 600; }
  .feed-list { flex: 1; overflow-y: auto; font-size: 12px; line-height: 1.6;
    display: flex; flex-direction: column-reverse; }
  .feed-row { display: grid; grid-template-columns: 60px 100px 1fr; gap: 10px; padding: 4px 0;
    border-bottom: 1px solid rgba(48, 54, 61, .4); }
  .feed-row .ts { color: var(--muted); font-size: 11px; }
  .feed-row .who { font-weight: 600; font-size: 11px; }
  .feed-row .who.opus    { color: var(--opus); }
  .feed-row .who.sonnet  { color: var(--sonnet); }
  .feed-row .who.haiku   { color: var(--haiku); }
  .feed-row .who.system  { color: var(--muted); }
  .feed-row .msg { color: var(--text); word-break: break-word; }
  .empty-state { color: var(--muted); font-style: italic; padding: 20px 0; text-align: center; }

  @media (max-width: 1100px) { main { grid-template-columns: 1fr; } .feed { height: 320px; } }
</style>
</head>
<body>
<header>
  <h1>🧑‍🤝‍🧑 Agent Team — Live Dashboard</h1>
  <div class="phase">Phase: <strong id="phase-label">—</strong></div>
</header>
<main>
  <div class="grid" id="grid"></div>
  <section class="feed">
    <h2>Activity Feed</h2>
    <div class="feed-list" id="feed"></div>
  </section>
</main>
<script>
  // Auto-discovers agents from status.json — no hardcoded agent list.
  // Order = the order keys appear in status.json's "agents" object.

  const $grid  = document.getElementById("grid");
  const $feed  = document.getElementById("feed");
  const $phase = document.getElementById("phase-label");

  function fmtElapsed(start, end) {
    if (!start) return "—";
    const e = (end ? new Date(end) : new Date()) - new Date(start);
    const s = Math.max(0, Math.floor(e / 1000));
    return `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
  }
  function fmtTime(ts) {
    const d = new Date(ts);
    return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}:${String(d.getSeconds()).padStart(2,"0")}`;
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" })[c]);
  }
  function statusLabel(s) { return ({idle:"Idle", running:"Running", done:"Done", error:"Error"})[s] || s; }
  function modelClass(m) { return ["opus","sonnet","haiku"].includes(m) ? m : "unknown"; }

  async function tick() {
    try {
      const [statusRes, logRes] = await Promise.all([
        fetch(`status.json?_=${Date.now()}`),
        fetch(`log.jsonl?_=${Date.now()}`),
      ]);
      const status = await statusRes.json();
      const logText = logRes.ok ? await logRes.text() : "";
      renderStatus(status);
      renderFeed(logText);
    } catch (e) { /* ignore transient errors */ }
  }

  function renderStatus(s) {
    $phase.textContent = s.phaseLabel || "—";
    const agents = s.agents || {};
    const keys = Object.keys(agents);
    if (!keys.length) {
      $grid.innerHTML = '<div class="empty-state">尚無 agent 註冊在 status.json</div>';
      return;
    }
    $grid.innerHTML = keys.map((key) => {
      const a = agents[key] || {};
      const status = a.status || "idle";
      const elapsed = fmtElapsed(a.startedAt, a.endedAt);
      const activity = a.activity || "等待指派";
      const isEmpty = !a.activity;
      const mc = modelClass(a.model);
      return `
        <div class="card ${status}">
          <div class="card-head">
            <div class="card-name">${escapeHtml(a.name || key)}</div>
            <span class="badge ${mc}">${escapeHtml((a.model || "?").toUpperCase())}</span>
          </div>
          <div class="role">${escapeHtml(a.role || "")}</div>
          <div class="status"><span class="dot ${status}"></span>${statusLabel(status)}</div>
          <div class="activity ${isEmpty ? "empty" : ""}">${escapeHtml(activity)}</div>
          <div class="meta"><span>elapsed</span><span>${elapsed}</span></div>
        </div>`;
    }).join("");
  }

  function renderFeed(text) {
    const lines = text.split("\n").filter(Boolean);
    if (!lines.length) { $feed.innerHTML = '<div class="empty-state">尚無活動</div>'; return; }
    const rows = lines.slice(-300).map((line) => {
      try {
        const e = JSON.parse(line);
        const cls = modelClass(e.model) === "unknown"
          ? (e.agent === "system" ? "system" : "")
          : modelClass(e.model);
        return `<div class="feed-row">
          <span class="ts">${fmtTime(e.ts)}</span>
          <span class="who ${cls}">${escapeHtml((e.agent || "").toUpperCase())}</span>
          <span class="msg">${escapeHtml(e.msg || "")}</span>
        </div>`;
      } catch { return ""; }
    });
    $feed.innerHTML = rows.join("");
  }

  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
